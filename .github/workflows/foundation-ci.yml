name: foundation-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  validate-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate stage 1 artifacts
        run: npm run check
